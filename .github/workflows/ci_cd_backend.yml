name: Build and Test PR

on:
  pull_request:
    paths:
      - "projects/VoxelCrypt/*"
      - ".github/workflows/cd_cd_backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore VoxelCrypt.slnx

      - name: Build solution
        run: dotnet build VoxelCrypt.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test VoxelCrypt.slnx --configuration Release --no-build --verbosity normal
